name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: lint + tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests + coverage (≥85%)
        run: uv run pytest --cov=spec_forge --cov-report=term-missing --cov-fail-under=85
